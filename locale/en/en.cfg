[technology-description]
hmfea-truthbomb=The final pre-Rocket-Silo research. Yields a single capsule of magnificent civic discontent. _"You were only supposed to blow the bloody doors off."_
hmfea-mr-blobby=Construct the headline payload. Fire it into space for the proper victory.

[recipe-name]
hmfea-medkit=NHS Medkit

[mod-setting-name]
hmfea-debug-logs=HMFEA debug logs
hmfea-debug-fixtures=HMFEA debug fixtures
hmfea-enable-mr-blobby=Mr. Blobby is the win condition

[mod-setting-description]
hmfea-debug-logs=When on, all script-side debug output is appended to script-output/hmfea-debug.txt. Off by default to avoid disk I/O during normal play.
hmfea-debug-fixtures=When on, exposes debug-only entities, recipes, and shortcut items in the crafting menu. Off in shipped builds.
hmfea-enable-mr-blobby=When on (default), the Mr. Blobby technology must be researched normally. Turn it off mid-game to earn the You Whimp achievement: the research auto-grants on prerequisite completion and your victory message becomes "Mr. Blobby says: Did you really win?". Once flipped off, the consolation cannot be undone — re-enabling does not retract the auto-grant.

[hmfea]
pillock-rebuke=You uncivilised pillock.
pis-what-now-name=Pis-what-now?
pis-what-now-description=A small, continental novelty of dubious provenance. Quite useless on a proper field of battle. Best left in the dressing-table drawer beside the cufflinks.
officers-dont-run=British Officers don't run.
tower-of-london-sentenced=A spoiled brew! To the Tower of London with you. Sixty seconds to reflect on your conduct.
tower-of-london-released=Released from the Tower of London. Mind your tea.
craving-start=A peckish feeling. You'll want a Cuppa Tea or Fish & Chips before too long.
craven-start=Bloody uncivilised! No tea, no chips, no work. The factory falls silent until you eat.
cravings-reset=That's better. Carry on.
batons-name=Baton
batons-description=Issued for the orderly application of force. Slightly larger than a cricket bat. Throws like a grenade. Effective radius: roughly one engineer.
musket-name=Musket
musket-description=A respectable English firearm. Reload between shots. And the next shot. And the one after that. There is no rush.
