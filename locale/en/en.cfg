pillock-rebuke=You uncivilised pillock.
pis-what-now-name=Pis-what-now?
pis-what-now-description=A small, continental novelty of dubious provenance. Quite useless on a proper field of battle. Best left in the dressing-table drawer beside the cufflinks.
officers-dont-run=British Officers don't run.
