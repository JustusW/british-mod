[mod-setting-description]
hmfea-debug-logs=When on, all script-side debug output is appended to script-output/hmfea-debug.txt. Off by default to avoid disk I/O during normal play.
hmfea-debug-fixtures=When on, exposes debug-only entities, recipes, and shortcut items in the crafting menu. Off in shipped builds.

