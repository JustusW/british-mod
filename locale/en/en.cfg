[item-description]
hmfea-medkit=Free at the point of use. Allow 30-120 seconds for treatment to take effect. Heals every player on the map — the NHS treats the whole nation, not just the patient.
hmfea-longbow=The proper first armament. Single-shot; reload between every loose. Carry plenty of arrows.
hmfea-arrow=One-shot magazine. Crafted on the field from a wooden shaft and a stone tip. Does not stack.
hmfea-cuppa-tea=A proper cup of tea. Hand-craft only. Drink it before it spoils — or face the Tower of London.
hmfea-spoiled-tea=A wasted brew. The Tower of London is no longer optional.
hmfea-greenhouse=Grows raw tea, paper-from-wood, potatoes, and farmed fish. Powered.
hmfea-woodchipper=Turns wood and potatoes into chips. Powered.
hmfea-fish-and-chips=The buildable alternative to Cuppa Tea. Doesn't spoil. Hand-craft only.
hmfea-chips=From the Woodchipper. Wood and potatoes go in, chips come out.
hmfea-potato=Grown in the Greenhouse.

[ammo-category-name]
hmfea-arrow=Arrows

[achievement-name]
hmfea-you-whimp=You Whimp
hmfea-bloody-uncivilised=Bloody Uncivilised

[achievement-description]
hmfea-you-whimp=You disabled Mr. Blobby mid-game. The research auto-grants from here on; once Mr. Blobby has spoken, he has spoken.
hmfea-bloody-uncivilised=Reached the Craven stage of the food cravings cycle. The factory is silent until you eat.

[technology-name]
hmfea-truthbomb=Truthbomb (NHS Double Decker Bus)
hmfea-mr-blobby=Mr. Blobby
hmfea-yer-a-wizard-arry=Yer'a Wizard 'Arry
hmfea-spell-petrificus-totalus=Spell: Petrificus Totalus
hmfea-spell-abra-kadabra=Spell: Abra Kadabra
hmfea-spell-avada-kedavra=Spell: Avada Kedavra
hmfea-philosophers-stone=Philosopher's Stone

[technology-description]
hmfea-truthbomb=The final pre-Rocket-Silo research. Yields a single capsule of magnificent civic discontent. _"You were only supposed to blow the bloody doors off."_
hmfea-mr-blobby=Construct the headline payload. Fire it into space for the proper victory.
hmfea-yer-a-wizard-arry=Unlocks the Wand. Spell research follows.
hmfea-spell-petrificus-totalus=Petrify the target. Heavy physical damage placeholder until the proper stone-conversion script lands.
hmfea-spell-abra-kadabra=A nuclear explosion centred on the throw point. Aim carefully.
hmfea-spell-avada-kedavra=A single targeted electric strike. Final spell in the branch.
hmfea-philosophers-stone=A prerequisite for the Tank. The work is alchemical, the result is a tank that can be researched.

[recipe-name]
hmfea-medkit=NHS Medkit

[entity-name]
hmfea-eu-flag=EU Flag

[entity-description]
hmfea-eu-flag=Dropped by fallen biters. Hand-mining only — bots refuse to touch it. Takes 30 seconds at base mining speed; mining faster than that respawns the flag at a larger tier.

[mod-setting-name]
hmfea-debug-logs=HMFEA debug logs
hmfea-debug-fixtures=HMFEA debug fixtures
hmfea-enable-mr-blobby=Mr. Blobby is the win condition

[mod-setting-description]
hmfea-debug-logs=When on, all script-side debug output is appended to script-output/hmfea-debug.txt. Off by default to avoid disk I/O during normal play.
hmfea-debug-fixtures=When on, exposes debug-only entities, recipes, and shortcut items in the crafting menu. Off in shipped builds.
hmfea-enable-mr-blobby=When on (default), the Mr. Blobby technology must be researched normally. Turn it off mid-game to earn the You Whimp achievement: the research auto-grants on prerequisite completion and your victory message becomes "Mr. Blobby says: Did you really win?". Once flipped off, the consolation cannot be undone — re-enabling does not retract the auto-grant.

[hmfea]
pillock-rebuke=You uncivilised pillock.
pis-what-now-name=Pis-what-now?
pis-what-now-description=A small, continental novelty of dubious provenance. Quite useless on a proper field of battle. Best left in the dressing-table drawer beside the cufflinks.
officers-dont-run=British Officers don't run.
tower-of-london-sentenced=A spoiled brew! To the Tower of London with you. Sixty seconds to reflect on your conduct.
tower-of-london-released=Released from the Tower of London. Mind your tea.
craving-start=A peckish feeling. You'll want a Cuppa Tea or Fish & Chips before too long.
craven-start=Bloody uncivilised! No tea, no chips, no work. The factory falls silent until you eat.
cravings-reset=That's better. Carry on.
batons-name=Baton
batons-description=Issued for the orderly application of force. Slightly larger than a cricket bat. Throws like a grenade. Effective radius: roughly one engineer.
musket-name=Musket
musket-description=A respectable English firearm. Reload between shots. And the next shot. And the one after that. There is no rush.
blobby-victory=Mr. Blobby has reached space. Rule Britannia.
blobby-consolation=Mr. Blobby says: Did you really win?
win-suppressed=The launch is duly noted. Mr. Blobby remains the only path to victory.
petrified-player=Petrificus Totalus. Frozen on the spot. The map is yours; nothing else is.
eu-hq-name=EU Headquarters
eu-hq-description=Continental administration block. Launches the rocket. Try not to think about it.
union-jack-rocket-name=Union Jack Rocket
union-jack-rocket-description=Painted on. The patriotism is structural.
mini-cooper-name=Mini Cooper
mini-cooper-description=Small, dependable, mostly British. Fits into car-sized gaps in the factory floor.
tank-name=Challenger Tank
tank-description=Pick a Challenger, a Churchill, whichever is to hand. Loops God Save the King while occupied.
