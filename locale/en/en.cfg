[item-description]
hmfea-medkit=Free at the point of use. Allow 30-120 seconds for treatment to take effect. Heals every player on the map — the NHS treats the whole nation, not just the patient.
hmfea-longbow=The proper first armament. Single-shot; reload between every loose. Carry plenty of arrows.
hmfea-arrow=One-shot magazine. Crafted on the field from a wooden shaft and a stone tip. Does not stack.
hmfea-cuppa-tea=A proper cup of tea. Hand-craft only. Drink it before it spoils — or face the Tower of London.
hmfea-spoiled-tea=A wasted brew. The Tower of London is no longer optional.
hmfea-greenhouse=Grows raw tea, paper-from-wood, potatoes, and farmed fish. Powered.
hmfea-woodchipper=Turns wood and potatoes into chips. Powered.
hmfea-fish-and-chips=The buildable alternative to Cuppa Tea. Doesn't spoil. Hand-craft only.
hmfea-chips=From the Woodchipper. Wood and potatoes go in, chips come out.
hmfea-potato=Grown in the Greenhouse.

